# Create a User for the Account
apiVersion: nauth.io/v1alpha1
kind: User
metadata:
  name: system-ref-user
  namespace: system-ref-test
spec:
  accountName: system-ref-account
  displayName: System Ref Test User
  permissions:
    pub:
      allow:
        - "events.>"
        - "requests.>"
      deny:
        - "events.internal.>"
    sub:
      allow:
        - "events.>"
        - "responses.>"
  natsLimits:
    subs: 10
    payload: 128
