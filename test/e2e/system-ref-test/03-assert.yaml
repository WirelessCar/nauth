# Verify User is created and ready
apiVersion: nauth.io/v1alpha1
kind: User
metadata:
  name: system-ref-user
  namespace: system-ref-test
  finalizers:
    - user.nauth.io/finalizer
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled
  claims:
    displayName: System Ref Test User
    permissions:
      pub:
        allow:
          - "events.>"
          - "requests.>"
        deny:
          - "events.internal.>"
      sub:
        allow:
          - "events.>"
          - "responses.>"
    natsLimits:
      subs: 10
      payload: 128
---
# Verify user credentials secret is created
apiVersion: v1
kind: Secret
metadata:
  name: system-ref-user-nats-user-creds
  namespace: system-ref-test
  labels:
    nauth.io/secret-type: user-creds
    nauth.io/managed: "true"
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: User
    name: system-ref-user
    namespace: system-ref-test
    ref: user
assertAll:
  # Verify user ID label is set (starts with U)
  - celExpr: matches(user.metadata.labels["user.nauth.io/id"], "^U.{55}$")
  # Verify user is linked to the account
  - celExpr: '"user.nauth.io/account-id" in user.metadata.labels'
