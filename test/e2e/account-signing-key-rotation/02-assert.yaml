apiVersion: nauth.io/v1alpha1
kind: Account
metadata:
  name: rotation-account
  finalizers:
    - account.nauth.io/finalizer
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: rotation-account
    ref: account
  - apiVersion: nauth.io/v1alpha1
    kind: AccountSigningKey
    name: external-auth-v1
    ref: ask_v1
assertAll:
  - celExpr: account.status.claims.signingKeys.exists(sk, sk.key == ask_v1.status.publicKey)
