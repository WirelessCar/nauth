apiVersion: nauth.io/v1alpha1
kind: AccountExport
metadata:
  name: my-account-export
status:
  conditions:
    - type: AdoptedByAccount
      status: "True"
      reason: OK
    - type: BoundToAccount
      status: "True"
      reason: OK
    - type: Ready
      status: "True"
      reason: OK
    - type: ValidRules
      status: "True"
      reason: OK
  desiredClaim:
    observedGeneration: 1
    rules:
      - name: recovery-rule
        subject: export-missing-account.>
        type: stream

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 20
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: my-account
    ref: my_account
  - apiVersion: nauth.io/v1alpha1
    kind: AccountExport
    name: my-account-export
    ref: my_account_export
assertAll:
  - celExpr: my_account_export.metadata.labels["accountexport.nauth.io/account-id"] == my_account.metadata.labels["account.nauth.io/id"]
  - celExpr: my_account_export.status.accountID == my_account.metadata.labels["account.nauth.io/id"]
