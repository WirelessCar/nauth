apiVersion: nauth.io/v1alpha1
kind: AccountExport
metadata:
  name: my-account-export
status:
  conditions:
    - type: BoundToAccount
      status: "False"
      reason: Failed
    - type: Ready
      status: "False"
      reason: Reconciling
    - type: ValidRules
      status: "True"
      reason: OK
  desiredClaim:
    observedGeneration: 1
    rules:
      - name: recovery-rule
        subject: export-missing-account.>
        type: stream
