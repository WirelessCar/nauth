apiVersion: nauth.io/v1alpha1
kind: Account
metadata:
  name: import-account
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled
  adoptions:
    imports:
      - name: my-account-import
        observedGeneration: 1
        status:
          status: "True"
          reason: OK
          desiredClaimObservedGeneration: 1
  claims:
    imports:
      - name: delayed-export-rule
        subject: export-delayed.>
        type: stream

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 20
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: import-account
    ref: import_account
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: export-account
    ref: export_account
  - apiVersion: nauth.io/v1alpha1
    kind: AccountImport
    name: my-account-import
    ref: my_account_import
assertAll:
  - celExpr: has(import_account.status.adoptions) && has(import_account.status.adoptions.imports) && import_account.status.adoptions.imports.size() == 1
  - celExpr: import_account.status.adoptions.imports[0].uid == my_account_import.metadata.uid
  - celExpr: has(import_account.status.claims) && has(import_account.status.claims.imports) && import_account.status.claims.imports.size() == 1
  - celExpr: import_account.status.claims.imports[0].account == export_account.metadata.labels["account.nauth.io/id"]
