# Verify Account is created and ready
apiVersion: nauth.io/v1alpha1
kind: Account
metadata:
  name: cluster-ref-account
  namespace: cluster-ref-test
  finalizers:
    - account.nauth.io/finalizer
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled
  claims:
    displayName: Cluster Ref Test Account
    accountLimits:
      conn: 50
      exports: 5
      imports: 5
    jetStreamLimits:
      streams: 3
      consumer: 10
      diskStorage: 536870912
      memStorage: 536870912
    natsLimits:
      subs: 50
      data: 512
      payload: 256
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: cluster-ref-account
    namespace: cluster-ref-test
    ref: account
assertAll:
  # Verify account ID label is set (starts with A)
  - celExpr: matches(account.metadata.labels["account.nauth.io/id"], "^A.{55}$")
commands:
  - command: 'e2e-ctl assert account-secrets --namespace cluster-ref-test --account cluster-ref-account --forbid-legacy-cluster-secrets'
