apiVersion: nauth.io/v1alpha1
kind: Account
metadata:
  name: my-account
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled
  adoptions:
    exports:
      - name: my-account-export
        observedGeneration: 2
        status:
          status: "True"
          reason: OK
          desiredClaimObservedGeneration: 2
  claims:
    exports:
      - name: updated-rule
        subject: export-account-updated.>
        type: stream

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 20
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: my-account
    ref: my_account
  - apiVersion: nauth.io/v1alpha1
    kind: AccountExport
    name: my-account-export
    ref: my_account_export
assertAll:
  - celExpr: has(my_account.status.adoptions) && has(my_account.status.adoptions.exports) && my_account.status.adoptions.exports.size() == 1
  - celExpr: my_account.status.adoptions.exports[0].uid == my_account_export.metadata.uid
