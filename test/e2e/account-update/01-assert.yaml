apiVersion: nauth.io/v1alpha1
kind: Account
metadata:
  name: example-account
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled
  claims:
    displayName: Original Example Account
    natsLimits:
      data: 1024
      payload: 500
      subs: 100

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 20
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: example-account
    ref: example_account
assertAll:
  - celExpr: matches(example_account.metadata.labels["account.nauth.io/id"], "^A.{55}$")
commands:
  - command: 'e2e-ctl account annotate-id --account example-account --annotation test.nauth.io/id-before'
