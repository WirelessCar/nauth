apiVersion: nauth.io/v1alpha1
kind: User
metadata:
  name: example-user
  finalizers:
    - user.nauth.io/finalizer
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled
  claims:
    displayName: My Example User
    natsLimits:
      data: 1000000
      payload: 1000000
      subs: 1000000
    permissions:
      pub:
        allow:
          - foo.>
          - bar.>
        deny:
          - baz
      resp:
        max: 100
        ttl: 1000000000
      sub:
        allow:
          - foo.>
          - baz.>
        deny:
          - bar
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 20
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: example-account
    ref: example_account
  - apiVersion: nauth.io/v1alpha1
    kind: User
    name: example-user
    ref: example_user
assertAll:
  - celExpr: matches(example_account.status.claims.signingKeys[0].key, "^A.{55}$")
  - celExpr: matches(example_user.metadata.labels["user.nauth.io/id"], "^U.{55}$")
  - celExpr: example_user.metadata.labels["user.nauth.io/account-id"] == example_account.metadata.labels["account.nauth.io/id"]
  - celExpr: example_user.metadata.labels["user.nauth.io/signed-by"] == example_account.status.claims.signingKeys[0].key
commands:
  - command: 'e2e-ctl assert user-creds-secret --user example-user --secret example-user-nats-user-creds'
