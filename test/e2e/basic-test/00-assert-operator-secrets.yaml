apiVersion: v1
kind: Secret
metadata:
  name: operator-op-sign
  namespace: nats

---
apiVersion: v1
kind: Secret
metadata:
  name: operator-sau-creds
  namespace: nats

---
apiVersion: nauth.io/v1alpha1
kind: NatsCluster
metadata:
  name: local-nats
  namespace: nats
spec:
  url: nats://nats.nats.svc.cluster.local:4222
  operatorSigningKeySecretRef:
    name: operator-op-sign
    key: default
  systemAccountUserCredsSecretRef:
    name: operator-sau-creds
    key: default

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 20
commands:
  - command: 'e2e-ctl assert operator-secrets --namespace nats --nats-cluster local-nats --operator-sign-secret operator-op-sign --system-creds-secret operator-sau-creds'
