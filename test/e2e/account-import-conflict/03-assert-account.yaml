apiVersion: nauth.io/v1alpha1
kind: Account
metadata:
  name: import-account
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Reconciled
  adoptions:
    imports:
      - name: my-account-import-a
        observedGeneration: 1
        status:
          status: "True"
          reason: OK
          desiredClaimObservedGeneration: 1
      - name: my-account-import-b
        observedGeneration: 1
        status:
          status: "False"
          reason: Conflict
          desiredClaimObservedGeneration: 1
  claims:
    imports:
      - name: conflicting-a
        subject: svc.request
        type: service

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: import-account
    ref: import_account
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: export-account
    ref: export_account
  - apiVersion: nauth.io/v1alpha1
    kind: AccountImport
    name: my-account-import-a
    ref: import_a
  - apiVersion: nauth.io/v1alpha1
    kind: AccountImport
    name: my-account-import-b
    ref: import_b
assertAll:
  - celExpr: import_account.status.adoptions.imports.exists(a, a.uid == import_a.metadata.uid)
  - celExpr: import_account.status.adoptions.imports.exists(a, a.uid == import_b.metadata.uid)
  - celExpr: import_account.status.claims.imports[0].account == export_account.metadata.labels["account.nauth.io/id"]
