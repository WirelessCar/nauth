apiVersion: nauth.io/v1alpha1
kind: AccountImport
metadata:
  name: my-account-import
status:
  conditions:
    - type: AdoptedByAccount
      status: "False"
      reason: Adopting
    - type: BoundToAccount
      status: "False"
      reason: NotFound
    - type: BoundToExportAccount
      status: "True"
      reason: OK
    - type: Ready
      status: "False"
      reason: NotReady
    - type: ValidRules
      status: "False"
      reason: NOK

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 20
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: export-account
    ref: export_account
  - apiVersion: nauth.io/v1alpha1
    kind: AccountImport
    name: my-account-import
    ref: my_account_import
assertAll:
  - celExpr: my_account_import.metadata.labels["accountimport.nauth.io/export-account-id"] == export_account.metadata.labels["account.nauth.io/id"]
  - celExpr: '!has(my_account_import.status.desiredClaim)'
