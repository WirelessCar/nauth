apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
resourceRefs:
  - apiVersion: nauth.io/v1alpha1
    kind: Account
    name: my-account
    ref: my_account
  - apiVersion: nauth.io/v1alpha1
    kind: AccountExport
    name: my-account-export-a
    ref: export_a
  - apiVersion: nauth.io/v1alpha1
    kind: AccountExport
    name: my-account-export-b
    ref: export_b
assertAll:
  - celExpr: >-
      export_a.metadata.labels["accountexport.nauth.io/account-id"] ==
      my_account.metadata.labels["account.nauth.io/id"]
  - celExpr: >-
      export_b.metadata.labels["accountexport.nauth.io/account-id"] ==
      my_account.metadata.labels["account.nauth.io/id"]
  - celExpr: >-
      export_a.status.accountID ==
      my_account.metadata.labels["account.nauth.io/id"]
  - celExpr: >-
      export_b.status.accountID ==
      my_account.metadata.labels["account.nauth.io/id"]

---
apiVersion: nauth.io/v1alpha1
kind: AccountExport
metadata:
  name: my-account-export-a
status:
  conditions:
    - type: AdoptedByAccount
      status: "True"
      reason: OK
    - type: BoundToAccount
      status: "True"
      reason: OK
    - type: Ready
      status: "True"
      reason: OK
    - type: ValidRules
      status: "True"
      reason: OK
  desiredClaim:
    observedGeneration: 1
    rules:
      - name: conflicting-a
        subject: conflict.>
        type: stream

---
apiVersion: nauth.io/v1alpha1
kind: AccountExport
metadata:
  name: my-account-export-b
status:
  conditions:
    - type: AdoptedByAccount
      status: "False"
      reason: Failed
    - type: BoundToAccount
      status: "True"
      reason: OK
    - type: Ready
      status: "False"
      reason: Reconciling
    - type: ValidRules
      status: "True"
      reason: OK
  desiredClaim:
    observedGeneration: 1
    rules:
      - name: conflicting-b
        subject: conflict.*
        type: stream
