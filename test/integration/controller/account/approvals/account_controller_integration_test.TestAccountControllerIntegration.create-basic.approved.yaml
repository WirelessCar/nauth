nats:
    accounts:
        - accountID: <ACCOUNT_ID>
          claims:
            iat: 0
            iss: <OPERATOR_SIGNING_KEY>
            jti: <JWT_ID>
            name: demo-account-it/orders
            nats:
                authorization: {}
                default_permissions:
                    pub: {}
                    sub: {}
                limits:
                    conn: -1
                    consumer: -1
                    data: -1
                    disk_max_stream_bytes: -1
                    disk_storage: -1
                    exports: -1
                    imports: -1
                    leaf: -1
                    max_ack_pending: -1
                    mem_max_stream_bytes: -1
                    mem_storage: -1
                    payload: -1
                    streams: -1
                    subs: 10
                    wildcards: true
                signing_keys:
                    - <ACCOUNT_SIGNING_KEY>
                type: account
                version: 2
            sub: <ACCOUNT_ID>
          name: demo-account-it/orders
resources:
    - apiVersion: nauth.io/v1alpha1
      kind: Account
      metadata:
        finalizers:
            - account.nauth.io/finalizer
        labels:
            account.nauth.io/id: <ACCOUNT_ID>
            account.nauth.io/signed-by: <OPERATOR_SIGNING_KEY>
        name: orders
        namespace: demo-account-it
      spec:
        natsLimits:
            data: -1
            payload: -1
            subs: 10
      status:
        claims:
            accountLimits:
                conn: -1
                exports: -1
                imports: -1
                leaf: -1
                wildcards: true
            displayName: demo-account-it/orders
            jetStreamLimits:
                consumer: -1
                diskMaxStreamBytes: -1
                diskStorage: -1
                maxAckPending: -1
                maxBytesRequired: false
                memMaxStreamBytes: -1
                memStorage: -1
                streams: -1
            natsLimits:
                data: -1
                payload: -1
                subs: 10
            signingKeys:
                - key: <ACCOUNT_SIGNING_KEY>
        claimsHash: <CLAIMS_HASH>
        conditions:
            - lastTransitionTime: <TIMESTAMP>
              message: Successfully reconciled
              reason: Reconciled
              status: "True"
              type: Ready
        observedGeneration: 1
        operatorVersion: integration-test
        reconcileTimestamp: <TIMESTAMP>
