name: Issue triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  add-triage-label:
    runs-on: ubuntu-latest
    steps:
      - name: Add triage label for non-maintainer issues
        if: ${{ !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) }}
        uses: actions/github-script@v8
        with:
          script: |
            const label = "needs-triage";
            const existing = context.payload.issue.labels.map(l => l.name);

            if (!existing.includes(label)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: [label],
              });
            }
