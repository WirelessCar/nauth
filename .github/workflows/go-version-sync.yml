name: Go Version Sync

on:
  pull_request:
    paths:
      - Dockerfile
      - go.mod
      - mise.toml
      - hack/verify-go-version-sync.sh
      - Makefile

jobs:
  verify-go-version-sync:
    name: verify Go version sync
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Verify Go versions are in sync
        run: |
          bash hack/verify-go-version-sync.sh
