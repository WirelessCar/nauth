name: Rebase Check
on:
  pull_request:
    branches: [ main ]

jobs:
  check-rebase:
    name: Verify Rebase on Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so we can compare branches
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check if PR head contains origin/main
        run: |
          git fetch origin main
          # Check if origin/main is an ancestor of the PR head
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "PR head already contains origin/main."
            exit 0
          else
            echo "::error title=Rebase Required::PR head does not contain the latest origin/main. Rebase the branch onto main before merging."
            exit 1
          fi
