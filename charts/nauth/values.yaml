# Default values for nauth.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  # -- Custom labels to apply to all resources.
  labels: {}
  # custom.label.environment: dev
  # custom.label.team: team-potato

nats:
  # -- DEPRECATED: Legacy implicit lookup URL. See `nats.clusterRef` for replacement.
  # -- Prefer explicit `nats.clusterRef.*` together with `NatsClusterRef` + `NatsCluster`.
  # -- Used only when `nats.clusterRef.name` is empty.
  # -- Must not be set together with `nats.clusterRef.name`.
  # // TODO: [#102][#144] Sunset `nats.url`/`NATS_URL` and implicit operator signing key/system account credentials lookup.
  url: ""

  # -- Operator-level NatsCluster configuration.
  # -- Set `clusterRef.name` to bind the operator to one NATS cluster.
  # -- `clusterRef.namespace` is optional and defaults to the release namespace.
  # -- `clusterRef.optional` defaults to false.
  # -- Default (`clusterRef.optional=false`) is strict single-cluster mode:
  # -- account-level refs must be absent or match this operator cluster.
  # -- `clusterRef.optional=true` is explicit opt-in default mode:
  # -- accounts without spec.natsClusterRef use this ref, but accounts may override.
  # -- Recommended migration path:
  # -- 1) Set `clusterRef` and keep `optional=false`.
  # -- 2) Add the same spec.natsClusterRef to all existing Accounts.
  # -- 3) Remove `clusterRef` when fully migrated to explicit per-Account refs.
  clusterRef:
    # -- NatsCluster name used to compose NATS_CLUSTER_REF as `<namespace>/<name>`.
    # -- Leave empty to disable operator-level cluster binding.
    name: ""

    # -- NatsCluster namespace used to compose NATS_CLUSTER_REF.
    # -- If empty and `name` is set, defaults to the Helm release namespace.
    namespace: ""

    # -- Controls whether account-level refs may deviate from this operator cluster.
    # -- false (default): strict mode, account refs must be absent or match.
    # -- true: default mode, account refs may override.
    optional: false

# -- Sets the replicaset count
replicaCount: 1

image:
  # -- Sets the operator image registry
  registry: ghcr.io/wirelesscar
  # -- Sets the operator repository
  repository: nauth-operator
  # -- Sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag
  # @default -- appVersion
  tag: ""

# -- Override the chart name
nameOverride: ""

# -- Override the chart fullName (Release.name + Chart.name)
fullnameOverride: ""

# -- Override the namespace
namespace:
  nameOverride: ""

# -- If true, limits the scope of nauth to a single namespace. Otherwise, all namespaces will be watched.
namespaced: false

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  nameOverride: ""

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  # fsGroup: 2000

# -- SecurityContext of the container
securityContext:
  # This is defined by the distroless nonroot user
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - "ALL"
  seccompProfile:
    type: RuntimeDefault

monitoring:
  # -- Enables nauth to use monitoring capabilities. Requires CRD:s to be installed.
  enabled: false
  # -- Enables serviceMonitor feature. Requies CRD to be installed beforehand.
  serviceMonitor:
    enabled: false

# -- Setting resources is up to the user. Follows PodSpec.
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

# -- This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

volumes: []

volumeMounts: []

terminationGracePeriodSeconds: 10

nodeSelector: {}

tolerations: []

affinity: {}

crds:
  # -- Indicates if Custom Resource Definitions should be installed and upgraded as part of the release.
  install: true
  # -- Indicates if Custom Resource Definitions should be kept when a release is uninstalled.
  keep: true
