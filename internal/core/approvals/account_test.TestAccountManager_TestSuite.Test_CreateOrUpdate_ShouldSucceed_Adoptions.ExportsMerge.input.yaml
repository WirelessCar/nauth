accountRef:
  namespace: account-namespace
  name: account-name
exportGroups:
  - ref: inline
    required: true
    exports:
      - name: my stream
        subject: foo.*
        type: stream
      - name: my service
        subject: bar.*
        type: service
      - name: my extra inline stream
        subject: baz.*
        type: stream
  - ref: aac5f3ce-7ed4-4981-b346-5dfcf778e585
    name: extracted export
    exports:
      - name: my extra extracted stream
        subject: boz.*
        type: stream
      - name: my stream
        subject: foo.*
        type: stream
      - name: my service
        subject: bar.*
        type: service
