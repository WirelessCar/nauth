account:
  apiVersion: nauth.io/v1alpha1
  kind: Account
  metadata:
    name: account-name
    namespace: account-namespace
  spec:
    exports:
      - name: my stream
        subject: foo.*
        type: stream
      - name: my service
        subject: bar.*
        type: service
      - name: my extra inline stream
        subject: baz.*
        type: stream
exportGroups:
  - ref: aac5f3ce-7ed4-4981-b346-5dfcf778e585
    name: extracted export
    exports:
      - name: my extra extracted stream
        subject: boz.*
        type: stream
      - name: my stream
        subject: foo.*
        type: stream
      - name: my service
        subject: bar.*
        type: service
