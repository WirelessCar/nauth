account:
  apiVersion: nauth.io/v1alpha1
  kind: Account
  metadata:
    name: account-name
    namespace: account-namespace
exportGroups:
  - ref: aac5f3ce-7ed4-4981-b346-5dfcf778e585
    name: foo API
    exports:
      - name: foo created events
        subject: evt.foo.created
        type: stream
      - name: foo deleted events
        subject: evt.foo.deleted
        type: stream
      - name: foo find service
        subject: svc.foo.find
        type: service
  - ref: 2cecbfcb-e92d-4bc9-bf4d-67d82737e707
    name: bar API
    exports:
      - subject: bar.report
        type: service
