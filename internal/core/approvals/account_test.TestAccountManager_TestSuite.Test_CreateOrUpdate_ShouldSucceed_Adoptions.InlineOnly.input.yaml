accountRef:
  namespace: account-namespace
  name: account-name
jetStreamEnabled: true
accountLimits:
  conn: 100
  exports: 100
  imports: 100
  leaf: -1
  wildcards: true
jetStreamLimits:
  consumer: 50
  streams: 10
natsLimits:
  data: 1024000
  payload: 50000
  subs: 100
exportGroups:
  - ref: inline
    required: true
    exports:
      - name: JS orders stream
        subject: orders.S.>
        type: stream
      - name: JS orders FC
        subject: $JS.FC.orders.>
        type: service
      - name: JS orders consumer create
        responseType: stream
        subject: $JS.API.CONSUMER.CREATE.orders
        type: service
      - name: JS orders consumer create wildcard
        responseType: stream
        subject: $JS.API.CONSUMER.CREATE.orders.>
        type: service
