account:
  apiVersion: nauth.io/v1alpha1
  kind: Account
  metadata:
    name: account-name
    namespace: account-namespace
  spec:
    jetStreamEnabled: true
    accountLimits:
      conn: 100
      exports: 100
      imports: 100
      leaf: -1
      wildcards: true
    exports:
      - name: JS orders stream
        subject: orders.S.>
        type: stream
      - name: JS orders FC
        subject: $JS.FC.orders.>
        type: service
      - name: JS orders consumer create
        responseType: Stream
        subject: $JS.API.CONSUMER.CREATE.orders
        type: service
      - name: JS orders consumer create wildcard
        responseType: Stream
        subject: $JS.API.CONSUMER.CREATE.orders.>
        type: service
    jetStreamLimits:
      consumer: 50
      streams: 10
    natsLimits:
      data: 1024000
      payload: 50000
      subs: 100
