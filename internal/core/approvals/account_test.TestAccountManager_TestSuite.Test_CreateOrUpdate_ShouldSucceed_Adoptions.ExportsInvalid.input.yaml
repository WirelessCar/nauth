account:
  apiVersion: nauth.io/v1alpha1
  kind: Account
  metadata:
    name: account-name
    namespace: account-namespace
  spec:
    exports:
      - name: inline export
        subject: inline.foor.*
        type: stream
exportGroups:
  - ref: aac5f3ce-7ed4-4981-b346-5dfcf778e585
    name: valid API
    exports:
      - name: valid stream
        subject: foo.*
        type: stream
      - name: valid service
        subject: bar.*
        type: service
  - ref: 2cecbfcb-e92d-4bc9-bf4d-67d82737e707
    name: invalid API
    exports:
      - name: valid subject A
        subject: subject.a
        type: service
      - subject: invalid subject
        type: stream
      - name: valid subject B
        subject: subject.b
        type: service
