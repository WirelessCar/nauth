imports:
  - name: my-stream-import
    accountRef:
      namespace: my-namespace
      name: stream-account
    subject: foo.stream.>
    localSubject: imported.foo.stream.>
    type: stream
  - name: my-service-import
    accountRef:
      namespace: my-namespace
      name: service-account
    subject: foo.service.>
    localSubject: imported.foo.service.>
    type: service
  - name: my-max-stream
    accountRef:
      namespace: my-namespace
      name: complex-account
    subject: max.stream.>
    localSubject: imported.max.stream.>
    type: stream
    allowTrace: true
  - name: my-max-service
    accountRef:
      namespace: my-namespace
      name: complex-account
    subject: max.service.>
    localSubject: imported.max.service.>
    type: service
    share: true
