imports:
  - name: my-stream-import
    accountID: ACCA
    subject: foo.stream.>
    localSubject: imported.foo.stream.>
    type: stream
  - name: my-service-import
    accountID: ACCB
    subject: foo.service.>
    localSubject: imported.foo.service.>
    type: service
  - name: my-max-stream
    accountID: ACCC
    subject: max.stream.>
    localSubject: imported.max.stream.>
    type: stream
    allowTrace: true
  - name: my-max-service
    accountID: ACCD
    subject: max.service.>
    localSubject: imported.max.service.>
    type: service
    share: true
